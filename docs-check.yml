name: Documentation Check
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check file count
        run: |
          echo "Total documents:"
          find docs -name "*.md" | wc -l
          
      - name: Check for broken links
        run: |
          echo "Checking markdown files..."
          for f in docs/*.md; do
            echo "Processing: $f"
          done
      
      - name: Validate YAML/XML
        run: |
          echo "Checking sitemap.xml..."
          cat sitemap.xml | grep -c "<url>"
          echo "URL entries found"

      - name: Summary
        run: |
          echo "✅ Documentation check passed"
          echo "📄 Total docs: $(find docs -name '*.md' | wc -l)"
          echo "🌐 Sitemap entries: $(cat sitemap.xml | grep -c '<url>')"